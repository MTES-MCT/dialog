services:
    App\Infrastructure\Persistence\Doctrine\PostGIS\Event\ORMSchemaEventListener:
        tags:
            - { name: doctrine.event_listener, event: postGenerateSchemaTable, connection: default }
            - { name: doctrine.event_listener, event: onSchemaColumnDefinition, connection: default }

doctrine:
    dbal:
        schema_filter: ~^(?!tiger)(?!topology)~
        types:
            geometry: 
                class: 'Jsor\Doctrine\PostGIS\Types\GeometryType'
                commented: false
            geojson_geometry:
                class: 'App\Infrastructure\Persistence\Doctrine\DBAL\Types\GeoJSONGeometryType'
                commented: true
    orm:
        dql:
            string_functions:
                ST_AsGeoJSON: 'Jsor\Doctrine\PostGIS\Functions\ST_AsGeoJSON'
                ST_ApproximateMedialAxis: 'App\Infrastructure\Persistence\Doctrine\PostGIS\Functions\ST_ApproximateMedialAxis'
