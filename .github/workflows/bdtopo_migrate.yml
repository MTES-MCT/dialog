name: BD TOPO Migrate

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Base BDTOPO cible'
        required: false
        default: '2025'
        type: choice
        options:
          - '2025'
          - '2025_2'
  push:
    branches:
      - main
    paths:
      - 'src/Infrastructure/Persistence/Doctrine/BdTopoMigrations/**'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BDTOPO_MIGRATE_TARGET: ${{ github.event.inputs.target || '2025' }}

    steps:
      - uses: actions/checkout@v1

      - name: Setup PHP with PECL extension
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Init environment variables
        run: |
          echo "BDTOPO_2025_DATABASE_URL=${{ secrets.BDTOPO_2025_DATABASE_URL }}" >> .env
          echo "BDTOPO_2025_2_DATABASE_URL=${{ secrets.BDTOPO_2025_2_DATABASE_URL }}" >> .env
          if [ "${BDTOPO_MIGRATE_TARGET}" = "2025_2" ]; then
            echo "BDTOPO_DATABASE_URL=${{ secrets.BDTOPO_2025_2_DATABASE_URL }}" >> .env
          else
            echo "BDTOPO_DATABASE_URL=${{ secrets.BDTOPO_2025_DATABASE_URL }}" >> .env
          fi

      - name: CI
        run: make ci_bdtopo_migrate BIN_COMPOSER="composer" BIN_CONSOLE="php bin/console"
